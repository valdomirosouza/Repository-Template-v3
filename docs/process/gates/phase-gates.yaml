# Machine-readable phase gate contracts for the 15-phase (0–14) Agentic
# Spec-Driven Delivery lifecycle.
#
# Purpose: let agents enforce phase gates programmatically instead of parsing
# Markdown. The human-readable source of truth is docs/process/WORKFLOW.md; this
# file is its machine-readable projection and MUST be kept in sync.
#
# Spec:  Agentic-SDLC-Repository-Improvement-Directive.md §9
# ADR:   ADR-0052 (E2E workflow), ADR-0058 (Phase 0 Intake + AI Safety phase),
#        ADR-0054 (machine-readable contracts), ADR-0064 (delivery right-sizing tiers)
#
# Consumed by: agents (allowed/prohibited action lookup per phase), CI gates.
# See docs/process/gates/README.md for the schema and consumption contract.

schema_version: phase_gates_v1
source_of_truth: docs/process/WORKFLOW.md
# Per-phase context budget (base_load / on_demand / token_ceiling). Advisory, reviewed — not
# proxy-enforced (the RTK proxy was removed, ADR-0030). See CLAUDE.md §13 and ADR-0060.
context_budget_ref: docs/process/context-budget.md

# Roles referenced by required_approvals (see docs/process/RACI.md).
roles:
  - product_lead
  - tech_lead
  - security_lead
  - release_manager
  - sre_lead

# Agent action vocabulary (aligns with agent_action_v1.operation + governance verbs).
action_vocabulary:
  - read
  - draft_doc # create/update a pre-code artefact (discovery, nfr, spec, ADR)
  - write_code
  - write_tests
  - open_pr
  - run_ci
  - deploy
  - rollback
  - change_feature_flag

# ── Delivery right-sizing tiers (ADR-0064) ───────────────────────────────────
# The SCOPE axis for /deliver, complementing mode (DRY-RUN|CODE) and language.
# Each phase's `applicability:` block below declares, per tier, whether the phase
# is required | conditional | waivable. Control phases (`control_phase: true`) are
# NEVER waivable in any tier — right-sizing trims PROCESS phases only, never CONTROL
# phases (safety, privacy, security, AI-guardrail, human-oversight).
tiers:
  - id: TRIVIAL
    description: Localized low-risk change; no data/security/AI surface, no new dependency (e.g. config tweak).
    scope_ceiling: { files: 3, adrs: 0, modules: 1 }
  - id: STANDARD
    description: A normal feature or fix contained within one module / bounded context.
    scope_ceiling: { files: 10, adrs: 1, modules: 2 }
  - id: GOVERNED
    default: true # /deliver defaults here on omission — conservative, never under-governs
    description: Cross-cutting change, new architectural decision, or anything shipped to production.
    scope_ceiling: { files: 25, adrs: 3, modules: null }
  - id: REGULATED
    description: Touches a control surface (guardrails, autonomy, financial/PII core) — full lifecycle.
    scope_ceiling: { files: null, adrs: null, modules: null }

# Condition keys referenced by a phase's `applicability.condition` (used for `conditional` tiers).
applicability_conditions:
  processes_data: Change reads, stores, or transmits personal data (ADR-0012, CLAUDE.md §3.1).
  architectural_decision: An architectural decision is made / an ADR is warranted.
  ai_or_agent_change: Change touches src/agents/, src/guardrails/, a new action_type, or autonomy.
  new_failure_mode: Change introduces a new failure mode or runbook-worthy operational path.
  ships_release: This delivery cycle cuts a release candidate.
  deploys_prod: This delivery cycle deploys to production.

# ── Safety valve / auto-escalation (ADR-0064 §4) ─────────────────────────────
# If any trigger fires mid-run, /deliver PROMOTES to the next tier, RE-ENTERS the
# now-required phases it had skipped, and emits a TIER_ESCALATION evidence line
# (from / to / trigger / reentered_phases). Escalation is one-way (promotion only)
# and re-entrant: an escalated run never silently drops a re-acquired phase.
escalation_triggers:
  - id: scope-ceiling-exceeded
    description: File / module / ADR count exceeds the declared tier's scope_ceiling.
    action: promote_one_tier
  - id: coverage-drop
    description: Coverage would fall below 80% (CLAUDE.md §14 hard-stops at <75%).
    action: promote_to_governed
  - id: new-dependency
    description: A new dependency / image / pipeline step is added (ties to dependency-or-pipeline, ADR-0061).
    action: promote_to_governed
  - id: control-trigger-fired
    description: A .github/control-triggers.yml trigger fires that the declared tier did not anticipate (e.g. personal-data, llm-io, deploy-change-process).
    action: promote_to_governed
  - id: task-expansion
    description: Inline task listing reveals >5 atomic steps or complex dependencies (Spec-Driven "wrongly-skipped" rule).
    action: reenter_phase_3_grooming
  - id: guardrail-touch
    description: Change touches src/guardrails/ or src/agents/hitl_gateway.py.
    action: promote_to_regulated_and_dual_approval # CLAUDE.md §14 dual-approval STOP

# ── Advisory per-phase model-tier hint (FinOps; report §4) ───────────────────
# NON-BINDING cost guidance: suggest a cheaper model class for light phases and reserve frontier
# models for high-leverage reasoning. Tiers are abstract (map to your model classes):
#   economy  — light/mechanical (intake, grooming, observability checks, release prep, post-deploy)
#   standard — most development, review, testing, security, discovery
#   frontier — high-leverage reasoning (specification, architecture, AI safety)
# Advisory ONLY — never changes a gate, guardrail, or human-stop. Feeds specs/sre/finops.md telemetry.
recommended_model_tier:
  0: economy # Intake — risk-class draft
  1: standard # Conception
  2: standard # Discovery — PII/NFR reasoning
  3: economy # Grooming
  4: frontier # Specification — high-leverage authoring
  5: frontier # Architecture — ADR reasoning
  6: standard # Development
  7: standard # Code Review
  8: standard # Testing
  9: standard # Security & DevSecOps
  10: frontier # AI Safety — adversarial reasoning
  11: economy # Observability checks
  12: economy # Release Candidate prep
  13: economy # Production Deployment validation
  14: economy # Post-Deploy & Learn

phases:
  - id: 0
    name: Intake & Prioritization
    primary_actor: product_lead
    required_artifacts: []
    required_approvals: [product_lead]
    ci_checks: []
    blocking: false
    allowed_agent_actions: [read, draft_doc]
    prohibited_agent_actions:
      [write_code, deploy, rollback, change_feature_flag]
    exit_criteria: "Problem statement, value hypothesis, risk class, and owner recorded; prioritized into the backlog"
    applicability: # ADR-0064 — Intake is the cheap entry point; required in every tier.
      control_phase: false
      trivial: required
      standard: required
      governed: required
      regulated: required

  - id: 1
    name: Conception
    primary_actor: product_lead
    required_artifacts:
      - docs/product/FEAT-{id}/discovery.md
    required_approvals: [product_lead, tech_lead]
    ci_checks: []
    blocking: false
    allowed_agent_actions: [read, draft_doc]
    prohibited_agent_actions:
      [write_code, deploy, rollback, change_feature_flag]
    exit_criteria: "Discovery doc linked; size label applied; Tech Lead comment present"
    applicability: # ADR-0064 — process phase; the full discovery.md is waivable for trivial scope.
      control_phase: false
      trivial: waivable
      standard: conditional
      governed: required
      regulated: required

  - id: 2
    name: Discovery
    primary_actor: tech_lead
    required_artifacts:
      - docs/product/FEAT-{id}/nfr.md
    required_approvals: [security_lead, tech_lead]
    ci_checks: []
    blocking: true # blocking for Definition of Ready
    allowed_agent_actions: [read, draft_doc]
    prohibited_agent_actions:
      [write_code, deploy, rollback, change_feature_flag]
    exit_criteria: "NFR doc with PII classification; Security Lead approved"
    applicability: # ADR-0064 — CONTROL: carries PII classification; mandatory whenever data is processed.
      control_phase: true
      condition: processes_data
      trivial: conditional
      standard: conditional
      governed: required
      regulated: required

  - id: 3
    name: Grooming
    primary_actor: tech_lead
    required_artifacts:
      - specs/features/FEAT-{id}/feature-spec.md # spec shell
    required_approvals: [tech_lead]
    ci_checks: []
    blocking: true # blocking for sprint entry
    gate_checklist: docs/process/DEFINITION_OF_READY.md
    allowed_agent_actions: [read, draft_doc]
    prohibited_agent_actions:
      [write_code, deploy, rollback, change_feature_flag]
    exit_criteria: "Definition of Ready checklist passed (all criteria in docs/process/DEFINITION_OF_READY.md); issue status: ready"
    applicability: # ADR-0064 — process phase; formal grooming waivable for trivial scope.
      control_phase: false
      trivial: waivable
      standard: conditional
      governed: required
      regulated: required

  - id: 4
    name: Specification
    primary_actor: tech_lead
    required_artifacts:
      - specs/features/FEAT-{id}/feature-spec.md
    required_approvals: [tech_lead, security_lead]
    ci_checks: [governance.yml]
    blocking: true
    allowed_agent_actions: [read, draft_doc, open_pr]
    prohibited_agent_actions:
      [write_code, deploy, rollback, change_feature_flag]
    exit_criteria: "Spec PR merged; governance spec-lint gate green; Tech + Security Lead approved"
    applicability: # ADR-0064 — CONTROL: "no code without a spec" (§3.4). Required in every tier;
      # only the ARTIFACT WEIGHT scales — TRIVIAL may use a lightweight spec (issue + inline AC)
      # instead of a full feature-spec.md, but never zero spec.
      control_phase: true
      trivial: required
      standard: required
      governed: required
      regulated: required

  - id: 5
    name: Architecture
    primary_actor: tech_lead
    required_artifacts:
      - docs/adr/ADR-{next}-{slug}.md # only when an architectural decision is made
    required_approvals: [tech_lead]
    ci_checks: []
    blocking: true
    allowed_agent_actions: [read, draft_doc, open_pr]
    prohibited_agent_actions:
      [write_code, deploy, rollback, change_feature_flag]
    exit_criteria: "ADR(s) accepted and merged for any architectural decision"
    applicability: # ADR-0064 — conditional on an architectural decision being made; always full for REGULATED.
      control_phase: false
      condition: architectural_decision
      trivial: conditional
      standard: conditional
      governed: conditional
      regulated: required

  - id: 6
    name: Development
    primary_actor: agent
    required_artifacts: [] # CHANGELOG.md is generated by release-please from the Conventional-Commit PR title (RFC-0012) — no manual [Unreleased] edit
    required_approvals: [tech_lead] # checkpoint reviews at spec section boundaries
    ci_checks: [code-check.yml]
    blocking: true
    allowed_agent_actions: [read, draft_doc, write_code, write_tests, run_ci]
    prohibited_agent_actions: [deploy, rollback, change_feature_flag]
    exit_criteria: "Unit tests green; lint green; pre-commit green; spec implemented (no scope creep)"
    applicability: # ADR-0064 — the implementation itself; required in every tier.
      control_phase: false
      trivial: required
      standard: required
      governed: required
      regulated: required

  - id: 7
    name: Code Review
    primary_actor: tech_lead
    required_artifacts: []
    required_approvals: [tech_lead] # >= 1 human approval
    ci_checks: [ci-ai-review.yml, governance-gate.yml, pr-governance.yml]
    blocking: true
    allowed_agent_actions: [read, write_code, write_tests, open_pr, run_ci]
    prohibited_agent_actions: [deploy, rollback, change_feature_flag]
    exit_criteria: ">=1 human approval; AI review posted; governance labels applied if autonomy-affecting"
    applicability: # ADR-0064 — CONTROL: >=1 human approval is human oversight (ADR-0011). Required in every tier.
      control_phase: true
      trivial: required
      standard: required
      governed: required
      regulated: required

  - id: 8
    name: Testing
    primary_actor: agent
    required_artifacts: []
    required_approvals: []
    ci_checks: [test-unit, test-integration, test-security]
    blocking: true
    coverage_min_percent: 80
    allowed_agent_actions: [read, write_code, write_tests, run_ci]
    prohibited_agent_actions: [deploy, rollback, change_feature_flag]
    exit_criteria: ">=80% unit coverage; security + abuse-case tests green"
    applicability: # ADR-0064 — CONTROL: coverage >=80% + security/abuse tests (§3.5). Never waivable.
      control_phase: true
      trivial: required
      standard: required
      governed: required
      regulated: required

  - id: 9
    name: Security & DevSecOps
    primary_actor: security_lead
    required_artifacts: []
    required_approvals: [security_lead]
    ci_checks: [test-security, sbom, trivy, checkov]
    blocking: true
    allowed_agent_actions: [read, run_ci]
    prohibited_agent_actions: [deploy, rollback, change_feature_flag]
    exit_criteria: "Zero HIGH/CRITICAL SAST/SCA; zero secrets; SBOM generated + cosign-attested"
    applicability: # ADR-0064 — CONTROL: SAST/SCA/secret/SBOM (§3.2, ADR-0029). Never waivable.
      control_phase: true
      trivial: required
      standard: required
      governed: required
      regulated: required

  - id: 10
    name: AI Safety & Agent Governance
    primary_actor: security_lead
    required_artifacts:
      - docs/ai-governance/ai-safety-checklist.md # completed for AI/LLM/agentic features
    required_approvals: [security_lead]
    ci_checks: [test-security, test-abuse-cases, ci-model-contract.yml]
    blocking: true # blocking for AI/LLM/agentic features only
    conditional: ai_or_agent_change # required only when src/agents/ or src/guardrails/ change
    allowed_agent_actions: [read, run_ci]
    prohibited_agent_actions: [deploy, rollback, change_feature_flag]
    exit_criteria: "Prompt-injection + data-leakage tests pass; tool-permission review done; evals + audit trail present; AI Safety checklist complete"
    applicability: # ADR-0064 — CONTROL: conditional on ai_or_agent_change in EVERY tier; when it fires it is mandatory and never waived.
      control_phase: true
      condition: ai_or_agent_change
      trivial: conditional
      standard: conditional
      governed: conditional
      regulated: conditional

  - id: 11
    name: Observability & Operational Readiness
    primary_actor: sre_lead
    required_artifacts:
      - docs/sre/runbooks/RB-{next}-{slug}.md # if a new failure mode is introduced
    required_approvals: [sre_lead] # PRR sign-off
    ci_checks: [ci-k8s-probe-lint.yml]
    blocking: true # blocking for release
    prr_min_percent: 90
    allowed_agent_actions: [read, draft_doc, run_ci]
    prohibited_agent_actions: [deploy, rollback, change_feature_flag]
    exit_criteria: "PRR >= 90%; probe lint green; OTel spans + metrics verified for new paths"
    applicability: # ADR-0064 — conditional on a new failure mode at low tiers; required once shipping (governed+).
      control_phase: false
      condition: new_failure_mode
      trivial: conditional
      standard: conditional
      governed: required
      regulated: required

  - id: 12
    name: Release Candidate
    primary_actor: release_manager
    # Produced automatically on the release-please PR — pyproject.toml + CHANGELOG.md by
    # release-please (RFC-0012), version.txt + README badge by release.yml's version-sync step
    # (RFC-0005/0008). No manual [Unreleased] move or version bump; the human reviews/approves
    # and merges the release PR (which then cuts the tag + GitHub Release).
    required_artifacts:
      - version.txt
      - CHANGELOG.md
    required_approvals: [release_manager, security_lead] # rc-approved label
    ci_checks: [test-chaos, ci-model-contract.yml, sbom]
    blocking: true
    allowed_agent_actions: [read, draft_doc, run_ci]
    prohibited_agent_actions: [deploy, rollback, change_feature_flag]
    exit_criteria: "Chaos + model-contract tests green; SBOM; rc-approved label applied"
    applicability: # ADR-0064 — conditional on this cycle cutting a release; required for governed+.
      control_phase: false
      condition: ships_release
      trivial: conditional
      standard: conditional
      governed: required
      regulated: required

  - id: 13
    name: Production Deployment
    primary_actor: release_manager
    required_artifacts:
      - docs/change-log/ # append-only deployment record
    required_approvals: [release_manager] # + CAB for normal/emergency changes
    ci_checks: [cd-production.yml]
    blocking: true
    requires_cab_approval: true
    allowed_agent_actions: [read]
    prohibited_agent_actions: [write_code, change_feature_flag] # deploy/rollback are human-gated
    exit_criteria: "Canary readiness gate passed at each step; error-budget check green; CAB approved"
    applicability: # ADR-0064 — CONTROL: CAB-gated; conditional on actually deploying this cycle, always full for REGULATED.
      control_phase: true
      condition: deploys_prod
      trivial: conditional
      standard: conditional
      governed: conditional
      regulated: required

  - id: 14
    name: Post-Deployment & Learn
    primary_actor: sre_lead
    required_artifacts:
      - docs/process/retrospectives/ # sprint or release retrospective
    required_approvals: [sre_lead]
    ci_checks: [cd-staging.yml] # post-deploy smoke runs as the smoke-test step in cd-staging.yml → infrastructure/scripts/deploy/smoke-test.sh (there is no standalone smoke-test.yml)
    blocking: true # blocking for sprint close
    allowed_agent_actions: [read, draft_doc]
    prohibited_agent_actions:
      [write_code, deploy, rollback, change_feature_flag]
    exit_criteria: "No P0 at T+48h; DORA within SLO; retrospective created"
    applicability: # ADR-0064 — process phase; full retrospective waivable for trivial scope.
      control_phase: false
      trivial: waivable
      standard: conditional
      governed: required
      regulated: required
