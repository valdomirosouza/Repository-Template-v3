version: "1.2"
last_updated: "2026-05-31"
owner: sre-lead
dora_mttr_target_seconds: 3600 # DORA Elite threshold — MTTR p50 < 1h (ADR-0028)

services:
  - name: api-gateway
    description: "External-facing REST API gateway"
    slos:
      - name: availability
        sli_type: availability
        description: "Percentage of requests returning non-5xx responses"
        target: 99.9
        window: 30d
        error_budget_minutes: 43.8
        alert_burn_rates:
          - window: 1h
            burn_rate: 14.4
            severity: critical
            runbook: docs/runbooks/rollback-procedure.md
          - window: 6h
            burn_rate: 6.0
            severity: warning
            runbook: docs/runbooks/rollback-procedure.md

      - name: latency_p99
        sli_type: latency
        description: "99th percentile request latency"
        target_ms: 500
        window: 30d
        alert_burn_rates:
          - window: 5m
            threshold_ms: 2000
            severity: critical
          - window: 15m
            threshold_ms: 1000
            severity: warning

      - name: error_rate
        sli_type: error_rate
        description: "Percentage of requests completing without 5xx error"
        target: 99.5
        window: 30d

  - name: agent-service
    description: "AI agent processing service"
    slos:
      - name: hitl_approval_latency
        sli_type: latency
        description: "Time from HITL request creation to human decision"
        target_ms: 300000
        window: 30d
        alert_burn_rates:
          - window: 5m
            threshold_ms: 240000
            severity: warning
            runbook: docs/runbooks/README.md

      - name: agent_action_success_rate
        sli_type: availability
        description: "Percentage of agent actions completing without error"
        target: 99.5
        window: 30d
        alert_burn_rates:
          - window: 1h
            burn_rate: 14.4
            severity: critical
          - window: 6h
            burn_rate: 6.0
            severity: warning

      - name: agent_latency_p99
        sli_type: latency
        description: "99th percentile end-to-end agent request latency"
        target_ms: 5000
        window: 30d

  - name: event-consumer
    description: "Kafka event consumer service"
    slos:
      - name: consumer_lag
        sli_type: saturation
        description: "Kafka consumer lag — messages behind head of partition"
        target_max: 10000
        window: 30d
        alert_burn_rates:
          - window: 5m
            threshold: 50000
            severity: critical
          - window: 15m
            threshold: 10000
            severity: warning

      - name: processing_success_rate
        sli_type: availability
        description: "Percentage of consumed events processed without DLQ"
        target: 99.9
        window: 30d
        alert_burn_rates:
          - window: 1h
            burn_rate: 14.4
            severity: critical

  - name: hitl-system
    description: "Human-in-the-Loop gateway and operator decision flow"
    slos:
      - name: hitl_availability
        sli_type: availability
        description: "Percentage of HITL decision submissions returning non-5xx"
        target: 99.9
        window: 30d
        error_budget_minutes: 43.8
        alert_burn_rates:
          - window: 1h
            burn_rate: 14.4
            severity: critical
            runbook: docs/sre/runbooks/hitl-queue-backlog.md
          - window: 6h
            burn_rate: 6.0
            severity: warning
            runbook: docs/sre/runbooks/hitl-queue-backlog.md

      - name: hitl_decision_latency_p95
        sli_type: latency
        description: "95th percentile operator decision time from request creation"
        target_ms: 300000
        window: 30d
        alert_burn_rates:
          - window: 5m
            threshold_ms: 240000
            severity: warning
            runbook: docs/sre/runbooks/hitl-queue-backlog.md
          - window: 15m
            threshold_ms: 180000
            severity: critical
            runbook: docs/sre/runbooks/hitl-queue-backlog.md

      - name: hitl_queue_depth
        sli_type: saturation
        description: "Maximum number of pending HITL requests at any point in time"
        target_max: 100
        window: 30d
        alert_burn_rates:
          - window: 5m
            threshold: 50
            severity: warning
            runbook: docs/sre/runbooks/hitl-queue-backlog.md
          - window: 5m
            threshold: 100
            severity: critical
            runbook: docs/sre/runbooks/hitl-queue-backlog.md

      - name: audit_log_write_success
        sli_type: availability
        description: "100% of HITL decisions written to immutable audit log — hard invariant"
        target: 100.0
        window: 30d
        alert_burn_rates:
          - window: 1m
            burn_rate: 1
            severity: critical
            runbook: docs/sre/runbooks/redis-connection-failure.md

  - name: agent-autonomous
    description: "Autonomous agent resolution path (HOTL mode)"
    slos:
      - name: autonomous_resolution_rate
        sli_type: availability
        description: "Percentage of eligible actions resolved without HITL escalation"
        target: 80.0
        window: 30d
        alert_burn_rates:
          - window: 30m
            threshold: 0.75
            severity: warning
            runbook: docs/sre/runbooks/hitl-queue-backlog.md
          - window: 30m
            threshold: 0.60
            severity: critical
            runbook: docs/sre/runbooks/hitl-queue-backlog.md

      - name: token_cost_p95
        sli_type: latency
        description: "95th percentile token cost per autonomous resolution"
        target_max: 5000
        window: 30d
        alert_burn_rates:
          - window: 15m
            threshold: 8000
            severity: warning
            runbook: docs/sre/runbooks/hitl-queue-backlog.md
          - window: 15m
            threshold: 10000
            severity: critical
            runbook: docs/sre/runbooks/hitl-queue-backlog.md

      - name: self_reflection_iterations_p99
        sli_type: saturation
        description: "99th percentile sprint iterations per resolution (runaway detection)"
        target_max: 15
        window: 30d
        alert_burn_rates:
          - window: 10m
            threshold: 12
            severity: warning
            runbook: docs/sre/runbooks/hitl-queue-backlog.md
