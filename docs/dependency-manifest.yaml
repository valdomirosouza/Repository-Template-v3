# docs/dependency-manifest.yaml
# Canonical inventory of all runtime dependencies — traditional AND AI.
#
# Purpose: complement the SBOM (sbom.cyclonedx.json / sbom.spdx.json generated
# by .github/workflows/sbom.yml) with AI-specific metadata that Syft cannot
# derive automatically: model identifiers, API versions, onboarding dates, data
# classification, and governance controls.
#
# Section overview:
#   python_runtime   — Python version constraint
#   python_packages  — key runtime deps (see pyproject.toml for the full list)
#   ai_dependencies  — LLM models, APIs, and AI tooling used by agents
#   infrastructure   — backing services (Kafka, Redis, PostgreSQL, …)
#   governance       — compliance and audit metadata for the AI dependency block

---
schema_version: "1.1.0"
last_updated: "2026-05-28"
maintainer: "Tech Lead <tech-lead@example.com>"
sbom_reference: "sbom.cyclonedx.json" # generated by sbom.yml on every main push

# ── Python runtime ─────────────────────────────────────────────────────────────
python_runtime:
  version: ">=3.13"
  package_manager: "uv"
  lock_file: "uv.lock"

# ── Key Python runtime packages ────────────────────────────────────────────────
# Full list lives in pyproject.toml. This section highlights packages with
# security, privacy, or AI-governance relevance.
python_packages:
  - name: anthropic
    version_constraint: ">=0.28.0"
    purpose: "Anthropic SDK — LLM API client used by all agent implementations"
    security_note: "API key stored in ANTHROPIC_API_KEY secret — never committed"

  - name: openfeature-sdk
    version_constraint: ">=0.4.0"
    purpose: "Feature flag SDK (OpenFeature/CNCF) — controls autonomous-mode and sandbox-mode"

  - name: opentelemetry-sdk
    version_constraint: ">=1.25.0"
    purpose: "Distributed tracing + metrics — mandatory for agent action auditability"

  - name: prometheus-client
    version_constraint: ">=0.20.0"
    purpose: "Golden Signals metrics — consumed by feedback_loop.py for risk-score adjustment"

# ── AI dependencies ────────────────────────────────────────────────────────────
# This block is the AI-specific extension to the SBOM.
# Every entry here must be reviewed during DPIA/RIPD assessment and PRR.
#
# Data classification levels follow docs/privacy/pii-inventory.md:
#   L1_PUBLIC  — no restrictions
#   L2_INTERNAL — internal use only
#   L3_CONFIDENTIAL — restricted access
#   L4_SECRET — highest restriction, never sent to external services
#
# Rule (CLAUDE.md §3.3): PII at L3/L4 MUST be masked by guardrails/pii_filter.py
# before reaching any AI dependency listed here.
ai_dependencies:
  - name: "Claude (Anthropic)"
    type: "llm_api"
    provider: "Anthropic PBC"
    provider_privacy_url: "https://www.anthropic.com/privacy"
    api_sdk: "anthropic-python"
    api_sdk_version_constraint: ">=0.28.0"

    models:
      - model_id: "claude-sonnet-4-6"
        role: "primary_reasoning"
        used_by:
          - "src/agents/harness/planner.py"
          - "src/agents/harness/evaluator.py"
          - "src/agents/harness/coordinator.py"
          - "src/agents/orchestrator/orchestrator.py"
        onboarded_date: "2026-05-01"
        data_classification_max: "L2_INTERNAL"
        pii_allowed: false
        pii_masking_enforced_by: "src/guardrails/pii_filter.py"
        prompt_injection_guard: "src/guardrails/prompt_injection_guard.py"
        hitl_gateway: "src/agents/hitl_gateway.py"
        behavioral_contract_version: "1.0"
        last_contract_tested: "2026-06-06"
        contract_test_suite: "tests/model_contract/"

      - model_id: "claude-haiku-4-5-20251001"
        role: "low_latency_classification"
        used_by: [] # reserved for future classification tasks
        onboarded_date: "2026-05-01"
        data_classification_max: "L2_INTERNAL"
        pii_allowed: false
        pii_masking_enforced_by: "src/guardrails/pii_filter.py"
        behavioral_contract_version: "1.0"
        last_contract_tested: "2026-06-06"
        contract_test_suite: "tests/model_contract/"

    rate_limits:
      monthly_token_budget_input: 10_000_000
      monthly_token_budget_output: 2_000_000
      budget_gauge_metric: "llm_tokens_budget_total"

    data_residency: "US (Anthropic cloud)"
    data_retention_at_provider: "30 days (API request logs per Anthropic policy)"
    audit_logging: "src/guardrails/audit_logger.py"

  - name: "Claude Code (Anthropic)"
    type: "agentic_coding_tool"
    provider: "Anthropic PBC"
    role: "developer_tooling"
    used_by: ["CLAUDE.md", "harness/doc-check.yml"]
    onboarded_date: "2026-05-01"
    data_classification_max: "L2_INTERNAL"
    pii_allowed: false
    note: >
      Claude Code operates on the codebase in the developer's local environment.
      No production data is sent to the tool. CLAUDE.md is the behavioral contract.

# ── Infrastructure services ────────────────────────────────────────────────────
infrastructure:
  - name: "Apache Kafka"
    version: "7.x (Confluent)"
    purpose: "Async event bus — agent.action.* and domain.* topics"
    data_classification_max: "L2_INTERNAL"

  - name: "Redis"
    version: "7.x"
    purpose: "HITL request store (HITLRedisStore) and session memory cache"
    data_classification_max: "L3_CONFIDENTIAL"
    pii_note: "HITL context summaries stored here are pre-masked by pii_filter.py"

  - name: "PostgreSQL"
    version: "16.x"
    purpose: "Persistent domain data store; pgvector extension for agent memory"
    data_classification_max: "L3_CONFIDENTIAL"

  - name: "flagd (OpenFeature)"
    version: ">=0.6.0"
    purpose: "Feature flag evaluation backend — controls autonomous-mode, sandbox-mode"

# ── Governance metadata ────────────────────────────────────────────────────────
governance:
  ai_governance_lead: "AI Governance Lead <ai-gov@example.com>"
  dpo: "DPO <dpo@example.com>"
  review_cadence: "quarterly or on every model upgrade"
  adr_references:
    - "docs/adr/ADR-0010-agent-framework-selection.md"
    - "docs/adr/ADR-0011-hitl-hotl-model.md"
    - "docs/adr/ADR-0012-pii-masking-strategy.md"
    - "docs/adr/ADR-0015-feature-flag-strategy.md"
    - "docs/adr/ADR-0020-finops-cost-allocation.md"
    - "docs/adr/ADR-0021-agent-communication-protocol.md"
  dpia_status: "reviewed — no new L3/L4 processing introduced by AI dependencies"
  last_dpia_review: "2026-05-26"
