[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# Application DB role that owns the service tables.
# REVOKE UPDATE/DELETE on audit_events is issued against this role to enforce immutability.
# Change this to the actual role name used in your environment before running migrations.
db_app_role = app_user

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
