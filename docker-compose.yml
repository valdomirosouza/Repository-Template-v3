# docker-compose.yml — Shared Infrastructure Stack
# -------------------------------------------------
# Brings up every backing service needed for local development.
# All language stacks (Python, Java, Go, Node.js) share this infrastructure.
#
# Usage:
#   docker compose up -d          # start all services in the background
#   docker compose down           # stop and remove containers
#   docker compose down -v        # also wipe volumes (full reset)
#   docker compose logs -f kafka  # tail logs for a specific service
#
# Ports exposed on localhost:
#   PostgreSQL      → 5432
#   Redis           → 6379
#   Kafka           → 9092  (broker)  9094 (controller)
#   Schema Registry → 8081
#   OTel Collector  → 4317 (gRPC)   4318 (HTTP)
#   Jaeger UI       → 16686
#   Prometheus      → 9090
#   Grafana         → 3001  (admin / admin)
#   flagd (HTTP)    → 8013  (gRPC)   8014 (HTTP/OFREP)

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    profiles: [core, observability, full]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apppassword}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-appuser} -d ${POSTGRES_DB:-appdb}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    profiles: [core, observability, full]
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD:-devpassword}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Kafka (KRaft mode — no Zookeeper) ───────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.8.0
    profiles: [events, full]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # PLAINTEXT (9092) — host-machine clients (kcat, pytest on host, etc.)
      # INTERNAL (29092) — container-to-container traffic (schema-registry, service containers)
      # CONTROLLER (9094) — KRaft internal; never advertised
      KAFKA_LISTENERS: PLAINTEXT://:9092,INTERNAL://:29092,CONTROLLER://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk # fixed ID for reproducible local dev
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── Kafka Schema Registry ────────────────────────────────────────────────────
  schema-registry:
    image: confluentinc/cp-schema-registry:7.8.0
    profiles: [events, full]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/subjects || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # ── OpenTelemetry Collector ──────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    profiles: [observability, full]
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./infrastructure/monitoring/opentelemetry/otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4317:4317" # gRPC (OTLP)
      - "4318:4318" # HTTP (OTLP)
      - "8888:8888" # Prometheus metrics self-telemetry
    depends_on:
      - jaeger
      - prometheus
    restart: unless-stopped

  # ── Jaeger (distributed tracing UI) ─────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.58
    profiles: [observability, full]
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686" # Jaeger UI
      - "14268:14268" # HTTP collector
    restart: unless-stopped

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    profiles: [observability, full]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    volumes:
      - ./infrastructure/monitoring/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    restart: unless-stopped

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    profiles: [observability, full]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/golden-signals.json
    volumes:
      - ./infrastructure/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

  # ── Alertmanager (REM-002, REM-014) ─────────────────────────────────────────
  # Routes Prometheus alerts to PagerDuty (severity=critical) and Slack (warning).
  # Requires PAGERDUTY_INTEGRATION_KEY in .env for real paging.
  alertmanager:
    image: prom/alertmanager:v0.27.0
    profiles: [full]
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./infrastructure/monitoring/alertmanager:/etc/alertmanager:ro
      - alertmanager_data:/alertmanager
    environment:
      PAGERDUTY_INTEGRATION_KEY: "${PAGERDUTY_INTEGRATION_KEY:-placeholder-set-in-env}"
    ports:
      - "9093:9093"
    depends_on:
      - prometheus
    restart: unless-stopped

  # ── flagd (OpenFeature flag server) ─────────────────────────────────────────
  flagd:
    image: ghcr.io/open-feature/flagd:v0.10.1
    profiles: [full]
    command:
      - start
      - --uri
      - file:/etc/flagd/flags/
    volumes:
      - ./infrastructure/feature-flags/flags:/etc/flagd/flags:ro
    ports:
      - "8013:8013" # gRPC
      - "8014:8014" # HTTP / OFREP
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:

networks:
  default:
    name: ${COMPOSE_PROJECT_NAME:-monorepo-dev}
