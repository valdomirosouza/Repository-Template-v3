# Canonical agent tool catalog
# Spec:  specs/ai/tool-registry.md
# ADR:   ADR-0039, ADR-0055 (reversibility metadata)
# Owner: Security Lead
#
# Every tool an agent may invoke MUST have an entry here.
# Unregistered tool calls are blocked at the orchestrator level.
# Add new tools and re-deploy — runtime registration is for tests only.
#
# Fields:
#   name:                  unique kebab-case identifier
#   description:           human-readable purpose
#   version:               semver; bump when endpoint signature changes
#   risk_level:            low | medium | high
#   pii_access:            list of L1-L4 PII classification levels accessible
#   requires_hitl:         true = always routed through HITL gateway
#   execution_mode:        direct | sandbox
#                          sandbox = MUST be routed through SandboxExecutor (ADR-0016, ADR-0047)
#                          direct  = executed in-process via Python function (subject to HITL gating)
#   rate_limit_per_minute: max invocations per minute per session
#   rate_limit_per_hour:   max invocations per hour per session
#   owner_team:            team responsible for this tool
#   adr_reference:         ADR governing this tool (optional)
#
# HOTL reversibility metadata (ADR-0055) — REQUIRED for every tool in production:
#   reversible:            true if the action can be undone by a compensating action
#   compensating_action:   name of the tool that reverses this one (null if none / not reversible)
#   max_hotl_risk_score:   highest risk_score at which this tool may auto-execute under HOTL
#                          (0.0 = never auto-executes; always routes through HITL)
#   allowed_autonomy_levels: autonomy levels permitted to invoke this tool autonomously
#   requires_dual_approval: true = two distinct human approvers required (segregation of duties)

tools:
  - name: send-email
    description: Send an email notification to one or more recipients
    version: "1.0"
    risk_level: high
    pii_access: [L1, L2]
    requires_hitl: true
    execution_mode: direct
    rate_limit_per_minute: 2
    rate_limit_per_hour: 20
    owner_team: platform
    adr_reference: ADR-0011
    reversible: false
    compensating_action: null
    max_hotl_risk_score: 0.0
    allowed_autonomy_levels: []
    requires_dual_approval: false

  - name: read-db-record
    description: Read a single record from the database by primary key
    version: "1.0"
    risk_level: low
    pii_access: [L3]
    requires_hitl: false
    execution_mode: direct
    rate_limit_per_minute: 60
    rate_limit_per_hour: 1000
    owner_team: platform
    adr_reference: ADR-0039
    reversible: true
    compensating_action: null
    max_hotl_risk_score: 0.3
    allowed_autonomy_levels: [low-risk, medium-risk, full]
    requires_dual_approval: false

  - name: write-db-record
    description: Create or update a record in the database
    version: "1.0"
    risk_level: medium
    pii_access: [L2, L3]
    requires_hitl: true
    execution_mode: direct
    rate_limit_per_minute: 10
    rate_limit_per_hour: 100
    owner_team: platform
    adr_reference: ADR-0039
    reversible: true
    compensating_action: restore-db-record
    max_hotl_risk_score: 0.0
    allowed_autonomy_levels: [medium-risk, full]
    requires_dual_approval: false

  - name: execute-code
    description: Execute AI-generated Python code in an isolated Docker sandbox
    version: "1.0"
    risk_level: high
    pii_access: []
    requires_hitl: true
    execution_mode: sandbox # MANDATORY: must route through SandboxExecutor (ADR-0016, ADR-0047)
    rate_limit_per_minute: 2
    rate_limit_per_hour: 10
    owner_team: platform
    adr_reference: ADR-0047
    reversible: false
    compensating_action: null
    max_hotl_risk_score: 0.0
    allowed_autonomy_levels: []
    requires_dual_approval: true

  - name: send-external-request
    description: Send an HTTP request to a registered external endpoint
    version: "1.0"
    risk_level: high
    pii_access: [L1, L2]
    requires_hitl: true
    execution_mode: direct
    rate_limit_per_minute: 5
    rate_limit_per_hour: 50
    owner_team: integrations
    adr_reference: ADR-0048
    reversible: false
    compensating_action: null
    max_hotl_risk_score: 0.0
    allowed_autonomy_levels: []
    requires_dual_approval: false

  - name: post-webhook
    description: POST a payload to a registered external webhook endpoint
    version: "1.0"
    risk_level: high
    pii_access: [L2]
    requires_hitl: true
    execution_mode: direct
    rate_limit_per_minute: 5
    rate_limit_per_hour: 50
    owner_team: integrations
    adr_reference: ADR-0039
    reversible: false
    compensating_action: null
    max_hotl_risk_score: 0.0
    allowed_autonomy_levels: []
    requires_dual_approval: false

  - name: generate-report
    description: Render a data report to PDF or CSV and store it in object storage
    version: "1.0"
    risk_level: low
    pii_access: [L3, L4]
    requires_hitl: false
    execution_mode: direct
    rate_limit_per_minute: 5
    rate_limit_per_hour: 50
    owner_team: data
    adr_reference: ADR-0039
    reversible: true
    compensating_action: delete-report
    max_hotl_risk_score: 0.3
    allowed_autonomy_levels: [low-risk, medium-risk, full]
    requires_dual_approval: false
