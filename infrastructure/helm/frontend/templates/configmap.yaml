apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "frontend.fullname" . }}-config
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
data:
  # NEXT_PUBLIC_* vars must match the values used at image build time.
  # If these differ from build-time values, the SSR HTML and client JS will disagree.
  # Re-build the image when changing NEXT_PUBLIC_* values (ADR-0023 §3).
  {{- range $key, $value := .Values.publicEnv }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- range $key, $value := .Values.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
