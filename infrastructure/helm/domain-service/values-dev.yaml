replicaCount: 1

image:
  pullPolicy: Always

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

autoscaling:
  minReplicas: 1
  maxReplicas: 1

pdb:
  minAvailable: 0

env:
  SPRING_PROFILES_ACTIVE: dev
  JAVA_OPTS: "-XX:MaxRAMPercentage=75 -XX:+UseG1GC"
  LOGGING_LEVEL_ROOT: DEBUG
