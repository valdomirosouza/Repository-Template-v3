# Default values — override in values-staging.yaml / values-production.yaml

replicaCount: 2

image:
  repository: ghcr.io/org/domain-service
  pullPolicy: IfNotPresent
  tag: "latest"

serviceAccount:
  create: true
  name: ""
  # annotations:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/domain-service-irsa

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70

pdb:
  minAvailable: 2

# Spring Boot environment variables
env:
  SPRING_PROFILES_ACTIVE: production
  JAVA_OPTS: "-XX:MaxRAMPercentage=75 -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError"
  LOGGING_LEVEL_ROOT: INFO
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus"
  MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: "when-authorized"

# Secrets injected from Kubernetes Secret — never hardcode values here.
# Create with: kubectl create secret generic domain-service-secrets --from-env-file=.env
secretRef: domain-service-secrets

probes:
  startup:
    path: /actuator/health/liveness
    failureThreshold: 36 # 36 × 5s = 180s max JVM warmup window
    periodSeconds: 5
    timeoutSeconds: 3
  liveness:
    path: /actuator/health/liveness
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    path: /actuator/health/readiness
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# 90s — JVM shutdown + in-flight Kafka message processing (ADR-0042)
terminationGracePeriodSeconds: 90
