apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: { { include "domain-service.fullname" . } }
  labels: { { - include "domain-service.labels" . | nindent 4 } }
spec:
  minAvailable: { { .Values.pdb.minAvailable } }
  selector:
    matchLabels: { { - include "domain-service.selectorLabels" . | nindent 6 } }
