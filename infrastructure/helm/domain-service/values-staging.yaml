replicaCount: 1

image:
  pullPolicy: Always

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  minReplicas: 1
  maxReplicas: 3

pdb:
  minAvailable: 1

env:
  SPRING_PROFILES_ACTIVE: staging
  JAVA_OPTS: "-XX:MaxRAMPercentage=75 -XX:+UseG1GC"
  LOGGING_LEVEL_ROOT: DEBUG
