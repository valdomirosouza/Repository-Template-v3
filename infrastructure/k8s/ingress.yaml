# Kubernetes Ingress — TLS termination for agent-service
#
# Spec:  specs/system/architecture.md (API Layer)
# ADR:   ADR-0007 (Service Mesh), ADR-0019 (Redis TLS and Value Encryption)
#
# Prerequisites:
#   cert-manager installed: kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
#   ClusterIssuer "letsencrypt-prod" configured: docs/sre/runbooks/cert-rotation.md
#
# TLS certificate is provisioned automatically by cert-manager using the
# cert-manager.io/cluster-issuer annotation below. Replace <your-domain> with
# the actual FQDN before deploying.
#
# HSTS: enforced via nginx.ingress.kubernetes.io/configuration-snippet.
# HTTP → HTTPS redirect: enforced via ssl-redirect annotation.
# All traffic from the Ingress to the backend Pod travels over the cluster
# network; enable mTLS sidecar (ADR-0007) for encrypted pod-to-pod traffic.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agent-service-ingress
  namespace: default
  annotations:
    # cert-manager: auto-provision and renew Let's Encrypt certificate
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

    # nginx-ingress: force HTTPS redirect and enable HSTS
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    # HSTS: 1 year, include subdomains, allow preload list submission
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains; preload";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";

    # Proxy buffer and timeout settings
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-body-size: "8m"

    # Rate limiting at ingress level (defence-in-depth; slowapi also applies in app)
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/limit-connections: "10"

spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - <your-domain> # replace before deploying, e.g. api.example.com
      secretName: agent-service-tls # cert-manager populates this Secret automatically
  rules:
    - host: <your-domain> # replace before deploying
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agent-service
                port:
                  number: 8000
---
# ClusterIssuer for Let's Encrypt production certificates.
# Requires cert-manager to be installed in the cluster.
# Replace <your-email> with the certificate owner's email address (receives expiry warnings).
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: <your-email> # replace before deploying
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
# Staging issuer for testing cert provisioning without hitting Let's Encrypt rate limits.
# Use cert-manager.io/cluster-issuer: "letsencrypt-staging" on the Ingress to test.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: <your-email> # replace before deploying
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
