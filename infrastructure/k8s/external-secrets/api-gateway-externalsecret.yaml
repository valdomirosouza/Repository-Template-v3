# ExternalSecret — materialises the `api-gateway-secrets` Kubernetes Secret from the secret store.
#
# This is the Secret the api-gateway Helm chart consumes via `envFrom: secretRef:`
# (values.yaml → secretRef: api-gateway-secrets). ESO keeps it in sync with the source of record
# (Vault / AWS Secrets Manager), so no secret value is ever committed or hand-created.
#
# Reference template — extend `data:` with every key the app needs (see src/shared/config.py).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: api-gateway-secrets
  namespace: production # set per environment
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend # or aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: api-gateway-secrets # MUST match the Helm chart's secretRef
    creationPolicy: Owner
  data:
    - secretKey: SECRET_KEY
      remoteRef:
        key: api-gateway # Vault path (secret/api-gateway) or AWS secret name
        property: secret_key
    - secretKey: DB_ENCRYPTION_KEY
      remoteRef:
        key: api-gateway
        property: db_encryption_key
    - secretKey: DATABASE_URL
      remoteRef:
        key: api-gateway
        property: database_url
    - secretKey: REDIS_URL
      remoteRef:
        key: api-gateway
        property: redis_url
  # Add further keys (JWT_SECRET, ANTHROPIC_API_KEY, …) following the same pattern.
