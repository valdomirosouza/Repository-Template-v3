# ClusterSecretStore — HashiCorp Vault (PRIMARY per ADR-0008).
#
# Reference template for the External Secrets Operator (ESO ≥ 0.10, API external-secrets.io/v1).
# It teaches ESO how to read secrets from Vault; an ExternalSecret (see
# api-gateway-externalsecret.yaml) then materialises a Kubernetes Secret from it. No plaintext secret
# is ever committed — only the *reference* to where the value lives.
#
# Replace the server URL and auth role for your environment. Requires ESO installed in the cluster.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "https://vault.internal:8200" # replace per environment
      path: "secret" # KV v2 mount
      version: "v2"
      auth:
        # Kubernetes auth: ESO authenticates to Vault using the pod ServiceAccount token.
        kubernetes:
          mountPath: "kubernetes"
          role: "external-secrets" # Vault role bound to the ESO ServiceAccount
