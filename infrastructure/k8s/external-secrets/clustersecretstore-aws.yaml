# ClusterSecretStore — AWS Secrets Manager (FALLBACK per ADR-0008).
#
# Use this where Vault is not available. AWS Secrets Manager already holds the DB credentials today
# (the Terraform `database` module exposes `secret_arn`), so this store lets ESO sync those into
# Kubernetes Secrets. Auth via IRSA (IAM Roles for Service Accounts) — no static AWS keys.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secretsmanager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1 # match the environments' aws_region
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets # ServiceAccount annotated with the IRSA role ARN
            namespace: external-secrets
