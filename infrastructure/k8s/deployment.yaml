---
# Agent service Deployment.
# Spec: specs/sre/prr.md (PRR-CAP-001, PRR-CAP-003)
# ADR:  ADR-0002 (Technology Stack Selection)

apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-service
  labels:
    app: agent-service
    version: "0.1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agent-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: agent-service
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: agent-service
          image: agent-service:latest
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: APP_ENV
              value: "production"
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-service-secrets
                  key: llm-api-key
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: agent-service-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: agent-service-secrets
                  key: redis-url
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                # Give the load balancer time to drain connections before SIGTERM.
                command: ["sleep", "5"]
