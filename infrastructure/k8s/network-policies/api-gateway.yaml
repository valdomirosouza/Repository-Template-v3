# API Gateway NetworkPolicy
# --------------------------
# Allows:
#   Ingress  → HTTP/8000 from the Kubernetes ingress controller
#   Egress   → PostgreSQL (5432), Redis (6379), Kafka (9092), OTel collector (4317/4318)
#   Egress   → DNS (53/UDP) required for all pod-to-pod name resolution
#   Egress   → HTTPS (443) for Anthropic LLM API calls
#
# ADR-0007 (Accepted: Istio) — Phase 1.  REM-003.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-gateway-ingress
  namespace: default
  labels:
    app.kubernetes.io/managed-by: helm
    security.io/policy: network-isolation
    rem: REM-003
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Receive HTTP traffic from the ingress controller (nginx / AWS ALB / GCP GLB)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
    # Allow Prometheus to scrape /metrics
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 8000
  egress:
    # DNS — required for all hostname resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    # Redis
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    # Kafka broker
    - to:
        - podSelector:
            matchLabels:
              app: kafka
      ports:
        - protocol: TCP
          port: 9092
    # OTel Collector (gRPC + HTTP)
    - to:
        - podSelector:
            matchLabels:
              app: otel-collector
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
    # Anthropic LLM API (external HTTPS)
    - ports:
        - protocol: TCP
          port: 443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: event-worker-ingress
  namespace: default
  labels:
    app.kubernetes.io/managed-by: helm
    security.io/policy: network-isolation
    rem: REM-003
spec:
  podSelector:
    matchLabels:
      app: event-worker
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow Prometheus scraping only
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 8090
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app: kafka
      ports:
        - protocol: TCP
          port: 9092
    - to:
        - podSelector:
            matchLabels:
              app: otel-collector
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: domain-service-ingress
  namespace: default
  labels:
    app.kubernetes.io/managed-by: helm
    security.io/policy: network-isolation
    rem: REM-003
spec:
  podSelector:
    matchLabels:
      app: domain-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # REST from api-gateway and ingress controller
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: kafka
      ports:
        - protocol: TCP
          port: 9092
    - to:
        - podSelector:
            matchLabels:
              app: otel-collector
      ports:
        - protocol: TCP
          port: 4317
