# Grafana dashboard provisioning
# --------------------------------
# Loads all JSON dashboards from the dashboards/ directory automatically.
# Add new dashboard JSON files to infrastructure/monitoring/grafana/dashboards/
# and they will appear in Grafana after a restart (or hot-reload).
#
# Reference: https://grafana.com/docs/grafana/latest/administration/provisioning/#dashboards

apiVersion: 1

providers:
  - name: monorepo-dashboards
    orgId: 1
    type: file
    disableDeletion: true
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
