# Jaeger all-in-one configuration — sampling policy and retention.
# Used by the jaeger service in docker-compose.yml.
#
# Spec: specs/system/architecture.md (Observability)
# ADR:  ADR-0004 (Observability Stack)
#
# In production: replace all-in-one with a distributed Jaeger deployment
# (collector + query + Cassandra/Elasticsearch backend).

collector:
  otlp:
    grpc:
      host-port: "0.0.0.0:4317"
    http:
      host-port: "0.0.0.0:4318"

sampling:
  strategies-file: /etc/jaeger/sampling-strategies.json

storage:
  type: memory
  options:
    memory:
      # Maximum number of traces retained in memory.
      # Increase for longer local debugging sessions; reduce if OOM.
      max-traces: 50000
