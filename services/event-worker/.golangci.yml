run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - gofmt
    - goimports
    - misspell

linters-settings:
  gosec:
    excludes:
      - G104 # unhandled errors — covered by errcheck
  goimports:
    local-prefixes: github.com/yourorg/monorepo

issues:
  exclude-rules:
    - path: _test\.go
      linters: [gosec]
