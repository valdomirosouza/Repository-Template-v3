site_name: Template Monorepo
docs_dir: docs

# Suppress "not found" warnings for links to files outside the docs/ tree
# (e.g. quickstart/ links to services.yaml, .env.example) and template
# placeholder links (e.g. ../runbooks/XXX.md in POSTMORTEM-TEMPLATE.md).
validation:
  links:
    not_found: ignore

theme:
  name: material
  palette:
    scheme: slate

nav:
  - Home: repo-structure.md
  - Template Structure (full reference): template-structure.md
  - Glossary: glossary.md
  - Troubleshooting: troubleshooting.md
  - Repository Maintenance:
      - Orphan Files Analysis: repository-maintenance/orphan-files-analysis.md
      - ADR Alignment Review: repository-maintenance/adr-alignment-review.md
      - ASDD 15-Phase Simulation Record: repository-maintenance/asdd-15-phase-simulation-record.md
  - Delivery Workflow:
      - Agentic Spec-Driven Delivery: sdlc/agentic-spec-driven-delivery.md
      - Delivery Agents (handoff schema): sdlc/agent-handoff-schema.md
      - Lifecycle (13/15-phase): process/WORKFLOW.md
      - Definition of Ready: process/DEFINITION_OF_READY.md
      - Definition of Done: process/DEFINITION_OF_DONE.md
      - Definition of Release: process/DEFINITION_OF_RELEASE.md
      - HITL Governance: process/HITL-GOVERNANCE.md
      - RACI Matrix: process/RACI.md
      - Sprint Tracking: process/SPRINT-TRACKING.md
      - Retrospective Guide: process/RETROSPECTIVE-GUIDE.md
      - "/deliver — Example Output": sdlc/deliver-example/README.md
  - Quickstart:
      - Overview: quickstart/README.md
      - Python Backend: quickstart/python-backend.md
      - Java Backend: quickstart/java-backend.md
      - Go Backend: quickstart/go-backend.md
      - Frontend: quickstart/frontend.md
      - Jobs & Workers: quickstart/jobs-worker.md
      - Contract-Driven Dev: quickstart/contract-driven-dev.md
      - Add a Service: quickstart/add-new-service.md
      - Delivering a Spec (/deliver): quickstart/delivering-a-spec.md
  - ADRs: adr/README.md
  - AI Governance:
      - AI Safety Checklist: ai-governance/ai-safety-checklist.md
      - Autonomy Boundaries: ai-governance/autonomy-boundaries.md
      - Model Card: ai-governance/model-card.md
      - EU AI Act: ai-governance/eu-ai-act-compliance.md
      - NIST AI RMF: ai-governance/nist-ai-rmf.md
  - Privacy:
