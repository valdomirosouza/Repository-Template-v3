name: CI — Context Graph

# Keeps the generated agent context graph honest (ADR-0057). On PRs that change the
# governance/implementation surface, this verifies the graph generator still runs and
# (on push to main) regenerates it as a build artifact. The graph itself is gitignored
# — it is a derived artifact, not source.

on:
  pull_request:
    paths:
      - "src/**"
      - "specs/**"
      - "docs/adr/**"
      - "skills/**"
      - "services.yaml"
      - "infrastructure/agent-tools/tools.yaml"
      - "docs/process/gates/**"
      - "docs/product/**"
      - "scripts/generate_context_graph.py"
      - ".github/workflows/ci-context-graph.yml"
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  context-graph:
    name: Generate Context Graph
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Generate context graph
        run: uv run python scripts/generate_context_graph.py
      - name: Enforce bootstrap size budget (< 50 KB)
        run: |
          SIZE=$(wc -c < .agent/context-graph.json)
          echo "context-graph.json size: ${SIZE} bytes"
          if [ "${SIZE}" -gt 51200 ]; then
            echo "::error::context-graph.json is ${SIZE} bytes (> 50 KB bootstrap budget)"
            exit 1
          fi
      - name: Upload context graph artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: context-graph
          path: .agent/context-graph.json
          retention-days: 14
