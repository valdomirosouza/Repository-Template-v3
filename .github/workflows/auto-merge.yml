# Scoped auto-merge — added 2026-05-29, narrowed 2026-05-29 (REM-005).
#
# Auto-approves and auto-merges a PR to `main` ONCE required status checks pass, but ONLY for
# low-risk changes:
#   • documentation-only PRs (all changed files under docs/ or *.md / *.markdown), or
#   • dependency-bump PRs authored by Dependabot.
#
# Any PR that touches application code, infrastructure, workflows, guardrails, etc. is SKIPPED
# here and falls back to normal human review — restoring segregation of duties / four-eyes for
# everything that matters (ISO 27001 A.5.3/A.8.32, SOC 2 CC8.1). See
# docs/compliance/remediation-register.md (REM-005).
#
# SAFETY: triggers on `pull_request` (NOT `pull_request_target`), is gated to same-repo PRs
# (forks get a read-only token), and never checks out or executes PR code (API calls only).

name: Auto-merge (docs & deps only)

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  auto-merge:
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      REPO: ${{ github.repository }}
      PR_AUTHOR: ${{ github.event.pull_request.user.login }}
    steps:
      - name: Dependabot metadata
        id: meta
        if: github.event.pull_request.user.login == 'dependabot[bot]'
        uses: dependabot/fetch-metadata@21025c705c08248db411dc16f3619e6b5f9ea21a # v2
      - name: Determine eligibility (docs-only or Dependabot patch/minor)
        id: scope
        env:
          UPDATE_TYPE: ${{ steps.meta.outputs.update-type }}
        run: |
          if [ "$PR_AUTHOR" = "dependabot[bot]" ]; then
            # Auto-merge only patch/minor bumps; major bumps fall back to human review (RFC-0020).
            case "$UPDATE_TYPE" in
              version-update:semver-patch|version-update:semver-minor)
                echo "Dependabot $UPDATE_TYPE — eligible."
                echo "eligible=true" >> "$GITHUB_OUTPUT" ;;
              *)
                echo "::notice::Dependabot '$UPDATE_TYPE' (major/unknown) — manual review required."
                echo "eligible=false" >> "$GITHUB_OUTPUT" ;;
            esac
            exit 0
          fi

          files=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json files --jq '.files[].path')
          echo "Changed files:"; echo "$files"

          ineligible=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              CLAUDE.md|AGENTS.md|docs/adr/*)       # governance/contract — never auto-merge (RFC-0003)
                echo "::notice::Governance/contract change requires human review: $f"; ineligible=1 ;;
              .claude/*|skills/*|specs/*)           # agent/skill/hook BEHAVIOUR + Spec-as-PR
                                                    # GOVERNANCE artefacts (PO/TL-owned) — require human
                                                    # review even though .md (NOT prose docs; #158)
                echo "::notice::Behavioural/governance change requires human review: $f"; ineligible=1 ;;
              docs/*|*.md|*.markdown) ;;            # ordinary documentation (README, docs/**) — eligible
              *) echo "::notice::Non-docs change requires review: $f"; ineligible=1 ;;
            esac
          done <<< "$files"

          if [ "$ineligible" -eq 1 ]; then
            echo "PR touches non-docs files — auto-merge SKIPPED; manual review required (REM-005)."
            echo "eligible=false" >> "$GITHUB_OUTPUT"
          else
            echo "Documentation-only PR — eligible."
            echo "eligible=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Auto-approve
        if: steps.scope.outputs.eligible == 'true'
        run: |
          gh pr review "$PR_NUMBER" --repo "$REPO" --approve \
            --body "Auto-approved: low-risk change (docs-only or Dependabot). Scoped per REM-005."

      - name: Enable auto-merge
        if: steps.scope.outputs.eligible == 'true'
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [[ "$HEAD_REF" == "develop" || "$HEAD_REF" == "main" ]]; then
            # Long-lived integration branch: merge commit preserves ancestry (no divergence), keep branch (RFC-0001, RFC-0002).
            flags="--merge --auto"
          else
            # Disposable feature branch: squash for clean history, delete after merge (RFC-0001).
            flags="--squash --auto --delete-branch"
          fi
          # Degrade gracefully if the repo's "Allow auto-merge" setting is off (GitHub's default —
          # template clones start disabled). Don't fail the check; tell the maintainer how to enable it.
          if ! gh pr merge "$PR_NUMBER" --repo "$REPO" $flags 2>/tmp/am_err; then
            if grep -qi "auto merge is not allowed" /tmp/am_err; then
              echo "::warning::Repo setting 'Allow auto-merge' is disabled — enable it under" \
                   "Settings → General → Pull Requests (or 'gh api -X PATCH repos/$REPO -F allow_auto_merge=true')" \
                   "to activate scoped docs/deps auto-merge (REM-005). Skipping (not a failure)."
              exit 0
            fi
            cat /tmp/am_err >&2
            exit 1
          fi
