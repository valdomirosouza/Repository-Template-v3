name: CD — Staging

on:
  workflow_call:
    inputs:
      sha:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      sha:
        description: "Git SHA to deploy"
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      id-token: write # required for keyless Cosign verify via OIDC
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ vars.CONTAINER_REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push staging image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: ${{ vars.CONTAINER_REGISTRY }}/${{ github.repository }}:staging-${{ inputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0

      - name: Generate SBOM from image
        run: |
          IMAGE="${{ vars.CONTAINER_REGISTRY }}/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]'):staging-${{ inputs.sha }}"
          syft "$IMAGE" \
            --output cyclonedx-json=sbom.json
          echo "SBOM generated — $(jq '.components | length' sbom.json) components"

      - name: Install Cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.2

      - name: Attest SBOM to image
        run: |
          IMAGE="${{ vars.CONTAINER_REGISTRY }}/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]'):staging-${{ inputs.sha }}"
          cosign attest \
            --predicate sbom.json \
            --type cyclonedx \
            --yes \
            "$IMAGE"

      - name: Verify SBOM attestation before deploy
        run: |
          IMAGE="${{ vars.CONTAINER_REGISTRY }}/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]'):staging-${{ inputs.sha }}"
          cosign verify-attestation \
            --type cyclonedx \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/cd-staging.yml" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "$IMAGE"

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: "3.14.0"

      - name: Deploy to staging via Helm
        run: |
          helm upgrade --install \
            --namespace staging \
            --create-namespace \
            --set image.tag=staging-${{ inputs.sha }} \
            --set environment=staging \
            --wait \
            --timeout 5m \
            app ./infrastructure/helm/api-gateway \
            --values infrastructure/helm/api-gateway/values-staging.yaml

      - name: Run smoke tests
        run: |
          bash infrastructure/scripts/deploy/smoke-test.sh \
            --env staging \
            --base-url ${{ vars.STAGING_BASE_URL }}

      - name: Notify deployment
        if: always()
        run: |
          echo "Staging deploy ${{ job.status }} — SHA ${{ inputs.sha }}"
          # Replace with actual Slack/Teams webhook step

  dast-scan:
    name: DAST — OWASP ZAP Full Scan
    needs: deploy-staging
    # W2-T3: the authenticated full scan + signed report evidence + cosign attestation on the image
    # digest now live in the reusable staging-dast.yml (single source of truth). cd-production
    # verifies the attestation it produces before promotion.
    uses: ./.github/workflows/staging-dast.yml
    with:
      sha: ${{ inputs.sha }}
    secrets: inherit
    permissions:
      contents: write
      id-token: write
      packages: write
      security-events: write
