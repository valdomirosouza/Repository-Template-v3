name: CD — Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: "SemVer version to deploy (e.g. 1.2.3)"
        required: true
        type: string
      strategy:
        description: "Deploy strategy"
        required: true
        type: choice
        options: [canary]
        default: canary
      service:
        description: "Service being deployed (resolves docs/sre/slo/<service>.yaml — ADR-0073)"
        required: false
        type: string
        default: api-gateway

permissions:
  contents: read

jobs:
  load-slo:
    name: Load SLO thresholds
    runs-on: ubuntu-latest
    # SLO-driven canary thresholds (ADR-0073): resolve the service's SLO file and expose its canary
    # thresholds to the gate jobs. A deployed service WITHOUT an SLO file fails here — no silent
    # default to a baked-in number.
    outputs:
      error_rate_max: ${{ steps.read.outputs.error_rate_max }}
      p99_max: ${{ steps.read.outputs.p99_max }}
      budget_min: ${{ steps.read.outputs.budget_min }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Resolve and read the service SLO file (no silent default)
        id: read
        env:
          SERVICE: ${{ inputs.service }}
        run: |
          set -euo pipefail
          SLO="docs/sre/slo/${SERVICE}.yaml"
          if [ ! -f "$SLO" ]; then
            echo "::error::No SLO file for service '${SERVICE}' at ${SLO} — canary thresholds must be defined (ADR-0073). Pipeline blocked."
            exit 1
          fi
          for key in error_rate_max p99_latency_seconds_max error_budget_min_ratio; do
            val="$(yq ".canary.${key}" "$SLO")"
            if [ "$val" = "null" ] || [ -z "$val" ]; then
              echo "::error::${SLO} is missing canary.${key} (ADR-0073)."; exit 1
            fi
          done
          {
            echo "error_rate_max=$(yq '.canary.error_rate_max' "$SLO")"
            echo "p99_max=$(yq '.canary.p99_latency_seconds_max' "$SLO")"
            echo "budget_min=$(yq '.canary.error_budget_min_ratio' "$SLO")"
          } >> "$GITHUB_OUTPUT"
          echo "Loaded canary thresholds for ${SERVICE} from ${SLO}."

  cab-check:
    name: CAB Approval Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Validate change type label and RFC approval
        run: |
          python3 - << 'EOF'
          import os, sys, re
          import urllib.request, json

          token = os.environ.get("GITHUB_TOKEN", "")
          repo  = os.environ["GITHUB_REPOSITORY"]
          sha   = os.environ["GITHUB_SHA"]

          # Find the PR associated with this SHA
          url = f"https://api.github.com/repos/{repo}/commits/{sha}/pulls"
          req = urllib.request.Request(url, headers={
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
          })
          with urllib.request.urlopen(req) as r:
              prs = json.load(r)

          if not prs:
              print("No PR found for this SHA — assuming standard-change (workflow_dispatch).")
              sys.exit(0)

          pr = prs[0]
          labels = {l["name"] for l in pr.get("labels", [])}
          body   = pr.get("body", "") or ""

          change_types = {"standard-change", "normal-change", "emergency-change"}
          found = labels & change_types
          if not found:
              print(f"ERROR: PR #{pr['number']} has no change-type label. "
                    f"Add one of: {change_types}")
              sys.exit(1)

          change_type = next(iter(found))
          print(f"Change type: {change_type}")

          if change_type == "normal-change":
              # Normal change: CAB-approved RFC required (ISO 27001 §change mgmt).
              if not re.search(r"Refs:\s*RFC-\d+", body, re.IGNORECASE):
                  print("ERROR: normal-change requires 'Refs: RFC-NNNN' in PR body.")
                  sys.exit(1)
              print("RFC reference found.")
              if os.environ.get("MANUAL_APPROVAL", "") != "confirmed":
                  print("ERROR: normal-change requires MANUAL_APPROVAL=confirmed "
                        "(set after CAB approves the RFC).")
                  sys.exit(1)
              print("CAB approval confirmed.")

          elif change_type == "emergency-change":
              # Emergency change: TL + SecOps async approval evidence; retroactive RFC
              # within 24h (CLAUDE.md §11). Require an incident reference AND an
              # emergency-approval line in the PR body.
              has_incident = re.search(r"(Incident|INC)[-:\s]*\d+", body, re.IGNORECASE)
              has_approval = re.search(r"Emergency-Approval:\s*\S+", body, re.IGNORECASE)
              if not (has_incident and has_approval):
                  print("ERROR: emergency-change requires emergency evidence in PR body: "
                        "an incident reference ('Incident: INC-NNNN') AND "
                        "'Emergency-Approval: <approver>'.")
                  sys.exit(1)
              print("Emergency evidence found (incident reference + emergency approval).")

          print("cab-check passed.")
          EOF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  check-error-budget:
    name: Check Error Budget
    runs-on: ubuntu-latest
    # Threshold comes from the service SLO (ADR-0073), never hard-coded here.
    needs: load-slo
    steps:
      - name: Query remaining error budget
        env:
          SERVICE: ${{ inputs.service }}
          BUDGET_MIN: ${{ needs.load-slo.outputs.budget_min }}
        run: |
          set -euo pipefail
          BUDGET=$(curl -sf "${{ vars.PROMETHEUS_URL }}/api/v1/query" \
            --data-urlencode "query=slo:error_budget_remaining:ratio{service=\"${SERVICE}\"}" \
            | jq -r '.data.result[0].value[1]')
          echo "Remaining budget: $BUDGET (minimum: $BUDGET_MIN)"
          python3 -c "import sys; sys.exit(0 if float('$BUDGET') > float('$BUDGET_MIN') else 1)" || {
            echo "::error::Remaining error budget at or below the SLO minimum — deploy blocked (ADR-0073)."
            exit 1
          }

  verify-artifact:
    name: Verify Artifact Integrity
    runs-on: ubuntu-latest
    # Integrity is verified only after change governance (CAB) passes.
    needs: cab-check
    permissions:
      contents: read
      id-token: write # keyless cosign verification
      packages: read
    outputs:
      image_digest: ${{ steps.resolve.outputs.digest }}
      image_ref: ${{ steps.resolve.outputs.image }}
      sbom_hash: ${{ steps.sbom.outputs.sbom_hash }}
    env:
      # Override with repo/org variables if the image lives elsewhere.
      IMAGE_REPOSITORY: ${{ vars.IMAGE_REPOSITORY || format('ghcr.io/{0}', github.repository) }}
      COSIGN_OIDC_ISSUER: ${{ vars.COSIGN_OIDC_ISSUER || 'https://token.actions.githubusercontent.com' }}
      COSIGN_IDENTITY_REGEXP: ${{ vars.COSIGN_CERT_IDENTITY_REGEXP || format('https://github.com/{0}/', github.repository) }}
    steps:
      - name: Install cosign + crane (pinned)
        run: |
          set -euo pipefail
          COSIGN_VERSION="v2.4.1"
          CRANE_VERSION="v0.20.2"
          curl -sSfL "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64" \
            -o /usr/local/bin/cosign
          chmod +x /usr/local/bin/cosign
          curl -sSfL "https://github.com/google/go-containerregistry/releases/download/${CRANE_VERSION}/go-containerregistry_Linux_x86_64.tar.gz" \
            | tar -xz -C /usr/local/bin crane
          cosign version
          crane version

      - name: Resolve immutable image digest
        id: resolve
        # P1-6: pin the deploy to an immutable digest, never a mutable tag.
        run: |
          set -euo pipefail
          DIGEST=$(crane digest "${IMAGE_REPOSITORY}:${{ inputs.version }}")
          echo "Resolved ${IMAGE_REPOSITORY}:${{ inputs.version }} -> ${DIGEST}"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE_REPOSITORY}" >> "$GITHUB_OUTPUT"

      - name: Verify Cosign signature (blocking)
        # P1-6: a missing/invalid signature fails the deploy before any traffic shift.
        run: |
          set -euo pipefail
          cosign verify \
            --certificate-oidc-issuer "${COSIGN_OIDC_ISSUER}" \
            --certificate-identity-regexp "${COSIGN_IDENTITY_REGEXP}" \
            "${IMAGE_REPOSITORY}@${{ steps.resolve.outputs.digest }}"

      - name: Verify SBOM attestation + record hash
        id: sbom
        run: |
          set -euo pipefail
          cosign verify-attestation --type cyclonedx \
            --certificate-oidc-issuer "${COSIGN_OIDC_ISSUER}" \
            --certificate-identity-regexp "${COSIGN_IDENTITY_REGEXP}" \
            "${IMAGE_REPOSITORY}@${{ steps.resolve.outputs.digest }}" > sbom-attestation.json
          SBOM_HASH=$(sha256sum sbom-attestation.json | cut -d' ' -f1)
          echo "sbom_hash=sha256:${SBOM_HASH}" >> "$GITHUB_OUTPUT"
          echo "SBOM attestation verified; hash sha256:${SBOM_HASH}"

      - name: Verify SLSA provenance
        run: |
          set -euo pipefail
          cosign verify-attestation --type slsaprovenance \
            --certificate-oidc-issuer "${COSIGN_OIDC_ISSUER}" \
            --certificate-identity-regexp "${COSIGN_IDENTITY_REGEXP}" \
            "${IMAGE_REPOSITORY}@${{ steps.resolve.outputs.digest }}"

      # W2-T3: gate promotion on the authenticated staging DAST having passed for THIS image
      # (the attestation produced by staging-dast.yml). REPORT MODE during burn-in (ADR-0070): a
      # missing/invalid attestation warns but does NOT yet block — flip to blocking by removing
      # `continue-on-error` once the burn-in in docs/governance/gate-lifecycle.md is met (HITL).
      - name: Verify staging DAST attestation (report mode)
        continue-on-error: true
        env:
          DAST_PREDICATE_TYPE: https://github.com/valdomirosouza/Repository-Template-v2/attestations/zap-dast/v1
        run: |
          set -euo pipefail
          if cosign verify-attestation --type "${DAST_PREDICATE_TYPE}" \
            --certificate-oidc-issuer "${COSIGN_OIDC_ISSUER}" \
            --certificate-identity-regexp "${COSIGN_IDENTITY_REGEXP}" \
            "${IMAGE_REPOSITORY}@${{ steps.resolve.outputs.digest }}" > /dev/null 2>&1; then
            echo "Staging DAST attestation verified for this image."
          else
            echo "::warning::No valid staging DAST attestation for ${IMAGE_REPOSITORY}@${{ steps.resolve.outputs.digest }} (report mode, ADR-0070 burn-in). Run the authenticated staging DAST before promotion."
            exit 1
          fi

  deploy-canary:
    name: Canary — 5%
    runs-on: ubuntu-latest
    # P0-5: CAB approval AND error budget AND artifact integrity must all pass
    # before any production traffic is shifted.
    needs: [load-slo, cab-check, check-error-budget, verify-artifact]
    environment: production
    if: ${{ inputs.strategy == 'canary' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: "3.14.0"

      - name: Deploy 5% canary
        # P1-6: deploy the verified immutable digest, not the mutable tag.
        run: |
          helm upgrade --install \
            --namespace production \
            --set image.tag=${{ inputs.version }} \
            --set image.digest=${{ needs.verify-artifact.outputs.image_digest }} \
            --set canary.enabled=true \
            --set canary.weight=5 \
            --wait --timeout 5m \
            app ./infrastructure/helm/api-gateway \
            --values infrastructure/helm/api-gateway/values-production.yaml

      - name: Wait and check Golden Signals (5%)
        # Thresholds resolved from the service SLO (ADR-0073) — no literals here.
        env:
          ERROR_RATE_MAX: ${{ needs.load-slo.outputs.error_rate_max }}
          P99_MAX: ${{ needs.load-slo.outputs.p99_max }}
        run: |
          echo "Waiting 15 minutes to observe canary metrics..."
          sleep 900
          ERROR_RATE=$(curl -sf "${{ vars.PROMETHEUS_URL }}/api/v1/query" \
            --data-urlencode 'query=rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m])' \
            | jq -r '.data.result[0].value[1]')
          P99=$(curl -sf "${{ vars.PROMETHEUS_URL }}/api/v1/query" \
            --data-urlencode 'query=histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m]))' \
            | jq -r '.data.result[0].value[1]')
          echo "Error rate: $ERROR_RATE | p99 latency: ${P99}s | SLO max: er=$ERROR_RATE_MAX p99=${P99_MAX}s"
          python3 -c "
          import sys
          er = float('$ERROR_RATE')
          p99 = float('$P99')
          if er > float('$ERROR_RATE_MAX') or p99 > float('$P99_MAX'):
              print(f'Golden Signals gate FAILED at 5% canary: error_rate={er:.4f}, p99={p99:.3f}s')
              sys.exit(1)
          "

  promote-canary-25:
    name: Canary — 25%
    runs-on: ubuntu-latest
    # load-slo provides the SLO-driven Golden Signals thresholds (ADR-0073).
    needs: [load-slo, deploy-canary]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: "3.14.0"

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Verify canary readiness stability before 5%→25% promotion
        # Spec: specs/k8s/probe-strategy.md §6 — readiness gate required before traffic shift
        run: |
          kubectl rollout status deployment/app-api-gateway \
            --namespace=production \
            --timeout=120s
          NOT_READY=$(kubectl get pods \
            --namespace=production \
            --selector=app.kubernetes.io/name=api-gateway \
            --field-selector='status.phase=Running' \
            -o jsonpath='{range .items[*]}{range .status.conditions[?(@.type=="Ready")]}{.status}{"\n"}{end}{end}' \
            | grep -c "False" || true)
          if [ "$NOT_READY" -gt "0" ]; then
            echo "::error::Canary has $NOT_READY unready pod(s) — aborting 5%→25% promotion"
            kubectl describe pods \
              --namespace=production \
              --selector=app.kubernetes.io/name=api-gateway | tail -60
            exit 1
          fi
          echo "All canary pods are Ready — proceeding to 25% promotion"

      - name: Promote to 25%
        run: |
          helm upgrade app ./infrastructure/helm/api-gateway \
            --namespace production \
            --values infrastructure/helm/api-gateway/values-production.yaml \
            --reuse-values \
            --set canary.weight=25 \
            --wait --timeout 5m

      - name: Wait and check Golden Signals (25%)
        # Thresholds resolved from the service SLO (ADR-0073) — no literals here.
        env:
          ERROR_RATE_MAX: ${{ needs.load-slo.outputs.error_rate_max }}
          P99_MAX: ${{ needs.load-slo.outputs.p99_max }}
        run: |
          echo "Waiting 15 minutes..."
          sleep 900
          ERROR_RATE=$(curl -sf "${{ vars.PROMETHEUS_URL }}/api/v1/query" \
            --data-urlencode 'query=rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m])' \
            | jq -r '.data.result[0].value[1]')
          P99=$(curl -sf "${{ vars.PROMETHEUS_URL }}/api/v1/query" \
            --data-urlencode 'query=histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m]))' \
            | jq -r '.data.result[0].value[1]')
          echo "Error rate: $ERROR_RATE | p99 latency: ${P99}s | SLO max: er=$ERROR_RATE_MAX p99=${P99_MAX}s"
          python3 -c "
          import sys
          er = float('$ERROR_RATE')
          p99 = float('$P99')
          if er > float('$ERROR_RATE_MAX') or p99 > float('$P99_MAX'):
              print(f'Golden Signals gate FAILED at 25% canary: error_rate={er:.4f}, p99={p99:.3f}s')
              sys.exit(1)
          "

  promote-canary-100:
    name: Full Deploy — 100%
    runs-on: ubuntu-latest
    needs: promote-canary-25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: "3.14.0"

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Verify canary readiness stability before 25%→100% promotion
        # Spec: specs/k8s/probe-strategy.md §6 — readiness gate required before traffic shift
        run: |
          kubectl rollout status deployment/app-api-gateway \
            --namespace=production \
            --timeout=120s
          NOT_READY=$(kubectl get pods \
            --namespace=production \
            --selector=app.kubernetes.io/name=api-gateway \
            --field-selector='status.phase=Running' \
            -o jsonpath='{range .items[*]}{range .status.conditions[?(@.type=="Ready")]}{.status}{"\n"}{end}{end}' \
            | grep -c "False" || true)
          if [ "$NOT_READY" -gt "0" ]; then
            echo "::error::Deployment has $NOT_READY unready pod(s) — aborting 25%→100% promotion"
            kubectl describe pods \
              --namespace=production \
              --selector=app.kubernetes.io/name=api-gateway | tail -60
            exit 1
          fi
          echo "All pods are Ready — proceeding to 100% promotion"

      - name: Promote to 100%
        run: |
          helm upgrade app ./infrastructure/helm/api-gateway \
            --namespace production \
            --values infrastructure/helm/api-gateway/values-production.yaml \
            --set image.tag=${{ inputs.version }} \
            --set canary.enabled=false \
            --wait --timeout 10m

  emit-dora-event:
    name: Emit DORA Metrics
    runs-on: ubuntu-latest
    needs: [promote-canary-100]
    if: always()
    outputs:
      lead_time_source: ${{ steps.lead-time.outputs.source }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # full history so the version tag's commit date is resolvable
          fetch-tags: true

      - name: Resolve lead-time reference timestamp
        id: lead-time
        # P1-5: this workflow is triggered by workflow_dispatch, so there is NO
        # github.event.pull_request context. Resolve the reference from the version
        # tag's commit date; if it cannot be resolved, record source=workflow_dispatch
        # and DO NOT emit a misleading zero lead time.
        run: |
          set -uo pipefail
          VERSION="${{ inputs.version }}"
          REF_TS=""
          SOURCE="workflow_dispatch"
          for TAG in "v${VERSION}" "${VERSION}"; do
            if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null 2>&1; then
              REF_TS=$(git log -1 --format=%cI "${TAG}")
              SOURCE="version_tag"
              echo "Resolved lead-time reference from tag ${TAG}: ${REF_TS}"
              break
            fi
          done
          if [ -z "${REF_TS}" ]; then
            echo "No version tag for '${VERSION}' — lead time unresolved (source=workflow_dispatch)."
          fi
          echo "reference_timestamp=${REF_TS}" >> "$GITHUB_OUTPUT"
          echo "source=${SOURCE}" >> "$GITHUB_OUTPUT"

      - name: Push DORA deployment event to Pushgateway
        run: |
          python3 - << 'EOF'
          import os, time
          from datetime import datetime
          import urllib.request

          outcome  = "success" if os.environ["DEPLOY_STATUS"] == "success" else "failure"
          service  = "api-gateway"
          env_name = "production"
          source   = os.environ.get("LEAD_TIME_SOURCE", "workflow_dispatch")
          ref_raw  = os.environ.get("REFERENCE_TIMESTAMP", "").strip()

          # P1-5: only compute a lead time when we have a real reference timestamp.
          # An unresolved reference is reported as source=workflow_dispatch, NOT as zero.
          lead_time = None
          if ref_raw:
              try:
                  lead_time = max(0.0, time.time() - datetime.fromisoformat(ref_raw).timestamp())
              except ValueError:
                  lead_time = None
          known = lead_time is not None

          metrics = [
              "# HELP dora_deployments_total Total deployments by outcome",
              "# TYPE dora_deployments_total counter",
              f'dora_deployments_total{{service="{service}",environment="{env_name}",outcome="{outcome}"}} 1',
              "# HELP dora_lead_time_source Lead-time provenance (1 = active source)",
              "# TYPE dora_lead_time_source gauge",
              f'dora_lead_time_source{{service="{service}",source="{source}"}} 1',
          ]
          if known:
              metrics += [
                  "# HELP dora_lead_time_seconds Lead time from version tag commit to production deploy",
                  "# TYPE dora_lead_time_seconds histogram",
                  f'dora_lead_time_seconds_sum{{service="{service}"}} {lead_time:.2f}',
                  f'dora_lead_time_seconds_count{{service="{service}"}} 1',
              ]
          payload = "\n".join(metrics) + "\n"

          pushgateway = os.environ.get("PROMETHEUS_PUSHGATEWAY_URL", "")
          if pushgateway:
              req = urllib.request.Request(
                  f"{pushgateway}/metrics/job/dora/instance/{service}",
                  data=payload.encode(), method="POST",
                  headers={"Content-Type": "text/plain"},
              )
              with urllib.request.urlopen(req) as r:
                  print(f"Pushgateway: HTTP {r.status}")
          else:
              print("PROMETHEUS_PUSHGATEWAY_URL not set — metrics logged only.")

          lt = f"{lead_time:.0f}s" if known else "unknown"
          print(f"DORA event: outcome={outcome}, lead_time={lt}, source={source}")
          EOF
        env:
          DEPLOY_STATUS: ${{ needs.promote-canary-100.result }}
          REFERENCE_TIMESTAMP: ${{ steps.lead-time.outputs.reference_timestamp }}
          LEAD_TIME_SOURCE: ${{ steps.lead-time.outputs.source }}
          PROMETHEUS_PUSHGATEWAY_URL: ${{ vars.PROMETHEUS_PUSHGATEWAY_URL }}

  record-change-evidence:
    name: Record Change Evidence
    runs-on: ubuntu-latest
    needs: [verify-artifact, promote-canary-100, emit-dora-event]
    if: always()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true

      - name: Append deploy record to docs/change-log/
        # Evidence captures the full provenance chain (ISO 27001 / SOX change record):
        # version, commit SHA, verified image digest, SBOM hash, timestamp, deployer.
        run: |
          DATE=$(date -u +%Y-%m-%d)
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          STATUS="${{ needs.promote-canary-100.result }}"
          OUTCOME=$([ "$STATUS" = "success" ] && echo "success" || echo "failure")
          FILE="docs/change-log/${DATE}.yaml"

          mkdir -p docs/change-log

          cat >> "$FILE" << YAML
          - timestamp: "${TIMESTAMP}"
            event: deploy
            deployer: "${{ github.actor }}"
            service: "api-gateway"
            version: "${{ inputs.version }}"
            commit_sha: "${{ github.sha }}"
            environment: "production"
            outcome: "${OUTCOME}"
            image_digest: "${{ needs.verify-artifact.outputs.image_digest || 'unknown' }}"
            sbom_hash: "${{ needs.verify-artifact.outputs.sbom_hash || 'unknown' }}"
            lead_time_source: "${{ needs.emit-dora-event.outputs.lead_time_source || 'workflow_dispatch' }}"
            change_type: "${{ vars.CHANGE_TYPE || 'standard-change' }}"
          YAML

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "docs/change-log/${DATE}.yaml"
          git diff --cached --quiet || git commit -m "chore(change-log): record deploy ${{ inputs.version }} [skip ci]"
          git push

  rollback-on-failure:
    name: Auto Rollback
    runs-on: ubuntu-latest
    needs: [deploy-canary, promote-canary-25, promote-canary-100]
    if: failure()
    steps:
