name: CI — Version Consistency

# Enforces that version.txt is the single source of truth (ADR-0057):
#   - pyproject.toml version must match version.txt
#   - README.md **Version:** must match version.txt
# CLAUDE.md carries an independent behavioral-contract version (excluded).

on:
  pull_request:
    paths:
      - version.txt
      - pyproject.toml
      - README.md
      - scripts/check_version_consistency.py
      - .github/workflows/ci-version-check.yml
  push:
    branches: [main, develop]
    paths:
      - version.txt
      - pyproject.toml
      - README.md

permissions:
  contents: read

jobs:
  version-consistency:
    name: Version Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Check version consistency
        run: python3 scripts/check_version_consistency.py
