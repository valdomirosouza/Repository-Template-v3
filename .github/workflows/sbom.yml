name: SBOM — Generate

# Generates the project SBOM (CycloneDX + SPDX) on every push to main and weekly,
# and retains it as an artifact. Image-level SBOM *attestation* is done in release.yml —
# the only workflow that builds + pushes a container image to attest against (RFC-0011).

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 3 * * 1" # Weekly on Monday 03:00 UTC

permissions:
  contents: read

jobs:
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Generate CycloneDX + SPDX SBOM
        run: |
          syft . \
            --output cyclonedx-json=sbom.cyclonedx.json \
            --output spdx-json=sbom.spdx.json

      - name: Validate SBOM component count
        run: |
          count=$(jq '.components | length' sbom.cyclonedx.json)
          echo "SBOM component count: $count"
          if [ "$count" -eq 0 ]; then
            echo "ERROR: SBOM is empty — syft scan found 0 components."
            exit 1
          fi

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ github.sha }}
          path: |
            sbom.cyclonedx.json
            sbom.spdx.json
            docs/dependency-manifest.yaml
          retention-days: 90
