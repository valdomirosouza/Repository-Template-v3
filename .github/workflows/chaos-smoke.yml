name: Chaos Smoke

# Chaos gates a PR (W2-10). A lightweight, in-process single-fault resilience smoke runs on PRs that
# touch the resilience-critical paths — so a regression in the fallback / retry behaviour is caught
# at review time, not in a game-day. The heavier Chaos-Toolkit experiments (ADR-0075) run against a
# deployed staging stack, not here.

on:
  pull_request:
    paths:
      - "src/workers/**"
      - "src/agents/hitl_gateway.py"
      - "src/agents/hitl_store.py"
      - "src/shared/retry.py"
      - "src/shared/broker.py"
      - "src/agents/request_store.py"
      - "tests/chaos/**"
      - ".github/workflows/chaos-smoke.yml"

permissions:
  contents: read

jobs:
  chaos-smoke:
    name: Chaos Smoke (resilience)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run chaos smoke (single-fault resilience)
        run: uv run pytest -m chaos tests/chaos/ -q
