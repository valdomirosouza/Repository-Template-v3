name: Secret Scanning

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  detect-secrets:
    name: Detect Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install detect-secrets
        run: pip install detect-secrets gibberish-detector

      - name: Run secret scan
        id: scan
        run: |
          detect-secrets scan \
            --exclude-files '\.git/.*' \
            --exclude-files 'tests/fixtures/.*' \
            --exclude-files '\.secrets\.baseline' \
            > scan-report.json || true
          # Compare scan results against the committed baseline using Python.
          # detect-secrets audit --report outputs JSON with "UNVERIFIED" category,
          # not "Potential Secret" text, so grep is unreliable across versions.
          NEW=$(python3 - <<'PYEOF'
          import json, sys
          try:
              with open("scan-report.json") as f: scan = json.load(f)
              with open(".secrets.baseline") as f: base = json.load(f)
              known = {e["hashed_secret"] for fl in base.get("results", {}).values() for e in fl}
              count = sum(1 for fl in scan.get("results", {}).values() for e in fl if e["hashed_secret"] not in known)
              print(count)
          except Exception:
              print(0)
          PYEOF
          )
          echo "new_secrets=${NEW:-0}" >> "$GITHUB_OUTPUT"

      - name: Fail on new secrets
        if: steps.scan.outputs.new_secrets != '0'
        run: |
          echo "Secret scanning found ${{ steps.scan.outputs.new_secrets }} potential secret(s)."
          echo "Review scan-report.json and update .secrets.baseline after false-positive triage."
          exit 1

      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: secret-scan-report-${{ github.sha }}
          path: scan-report.json
          retention-days: 30

      - name: Comment on PR with findings
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@d746ffe35508b1917358783b479e04febd2b8f71 # v9.0.0
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Secret Scanning Failed\n\nPotential secrets detected. Download the `secret-scan-report` artifact and run `detect-secrets audit` locally to triage findings.\n\nDo **not** commit real credentials. Use `.env.example` with placeholder values only.'
            })
