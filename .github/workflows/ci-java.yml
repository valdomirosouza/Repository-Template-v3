name: CI — Java

on:
  push:
    branches: ["main", "develop"]
    paths:
      - "services/**/pom.xml"
      - "services/**/*.java"
      - "services/**/application*.yml"
      - "docs/api/openapi/**"
      - "docs/api/grpc/proto/**"
      - "infrastructure/message-broker/schema-registry/avro/**"
      - ".github/workflows/ci-java.yml"
  pull_request:
    branches: ["main", "develop"]
    paths:
      - "services/**/pom.xml"
      - "services/**/*.java"
      - "services/**/application*.yml"
      - "docs/api/openapi/**"
      - "docs/api/grpc/proto/**"
      - "infrastructure/message-broker/schema-registry/avro/**"
      - ".github/workflows/ci-java.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"
  MAVEN_OPTS: "-Xmx2g -XX:+TieredCompilation -XX:TieredStopAtLevel=1"

permissions:
  contents: read

jobs:
  lint-java:
    name: Java Lint & SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: microsoft
          cache: maven

      - name: Checkstyle
        run: |
          find services -name pom.xml -not -path '*/target/*' | while read pomfile; do
            dir=$(dirname "$pomfile")
            echo "Checkstyle: $dir"
            (cd "$dir" && mvn checkstyle:check)
          done

      - name: SpotBugs (SAST)
        run: |
          find services -name pom.xml -not -path '*/target/*' | while read pomfile; do
            dir=$(dirname "$pomfile")
            echo "SpotBugs: $dir"
            (cd "$dir" && mvn spotbugs:check)
          done

      - name: OWASP Dependency-Check (blocks on CVSS ≥ 7.0)
        run: |
          find services -name pom.xml -not -path '*/target/*' | while read pomfile; do
            dir=$(dirname "$pomfile")
            echo "Dependency-Check: $dir"
            (cd "$dir" && mvn dependency-check:check \
              -Ddependency-check.failBuildOnCVSS=7 \
              -Ddependency-check.suppressionFile=dependency-check-suppressions.xml)
          done
        # Fails the build when any dependency has a CVE with CVSS ≥ 7.0 (HIGH or CRITICAL).
        # False positives must be documented in dependency-check-suppressions.xml with CVE ID and rationale.

      - name: Upload Dependency-Check report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: dependency-check-report
          path: "**/target/dependency-check-report.html"
          retention-days: 14

  test-java-unit:
    name: Java Unit Tests
    runs-on: ubuntu-latest
    needs: lint-java
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: microsoft
          cache: maven

      - name: Generate sources (OpenAPI stubs + Avro classes)
        run: |
          find services -name pom.xml -not -path '*/target/*' | while read pomfile; do
            dir=$(dirname "$pomfile")
            echo "Generate sources: $dir"
            (cd "$dir" && mvn generate-sources)
          done

      - name: Unit tests with JaCoCo
        run: |
          find services -name pom.xml -not -path '*/target/*' | while read pomfile; do
            dir=$(dirname "$pomfile")
            echo "Unit tests: $dir"
            (cd "$dir" && mvn test)
          done

      - name: Enforce coverage threshold (≥ 80%)
        run: |
          find services -name pom.xml -not -path '*/target/*' | while read pomfile; do
            dir=$(dirname "$pomfile")
            echo "JaCoCo check: $dir"
            (cd "$dir" && mvn jacoco:check)
          done

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: java-coverage
          path: "**/target/site/jacoco/"

  test-java-integration:
    name: Java Integration Tests
    runs-on: ubuntu-latest
    needs: test-java-unit
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d testdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      kafka:
        image: confluentinc/cp-kafka:7.8.0
        ports:
          - 9092:9092
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9094
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9094
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
          CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
        options: >-
          --health-cmd "kafka-broker-api-versions --bootstrap-server localhost:9092"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: microsoft
          cache: maven

      - name: Run integration tests (Testcontainers disabled — using services above)
        run: |
          find services -name pom.xml -not -path '*/target/*' | while read pomfile; do
            dir=$(dirname "$pomfile")
            echo "Integration tests: $dir"
            (cd "$dir" && mvn verify -P integration-tests)
          done
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/testdb
          SPRING_DATASOURCE_USERNAME: testuser
          SPRING_DATASOURCE_PASSWORD: testpassword
          SPRING_KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          SPRING_DATA_REDIS_URL: redis://localhost:6379

  build-java:
    name: Java Build Image
    runs-on: ubuntu-latest
    needs: [test-java-unit]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: microsoft
          cache: maven

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build container image (Spring Boot buildpack, no push on PR)
        run: |
          find services -name pom.xml -not -path '*/target/*' -maxdepth 2 | while read pom; do
            service=$(dirname "$pom" | xargs basename)
            echo "Building image for $service..."
            # cd into the service (no root reactor pom, so `-pl services/<name>` from root fails
            # with "Could not find the selected project in the reactor") — matches every other
            # step in this workflow and `make build-java`.
            (cd "services/$service" && mvn spring-boot:build-image \
              -Dspring-boot.build-image.imageName=ghcr.io/${{ github.repository_owner }}/${service}:${{ github.sha }} \
              -DskipTests)
          done
