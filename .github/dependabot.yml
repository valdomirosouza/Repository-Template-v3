version: 2
# Multi-language SCA coverage (RFC-0015): Python, GitHub Actions, npm (frontend),
# Go (event-worker), Maven (domain-service), and Docker base images. Minor/patch
# updates are grouped to limit PR noise; majors stay individual for review.
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      python-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: npm
    directory: /frontend/frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: gomod
    directory: /services/event-worker
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      go-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: maven
    directory: /services/domain-service
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      maven-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: docker
    directories:
      - /
      - /services/event-worker
      - /frontend/frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      docker-minor-patch:
        update-types: ["minor", "patch"]
