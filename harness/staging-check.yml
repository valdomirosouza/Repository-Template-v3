name: staging-check
description: Staging gate — all gates must pass before promoting to production
version: "1.0"

gates:
  - name: integration-tests
    command: "uv run pytest tests/integration/ -v --timeout=120"
    blocking: true
    failure_message: "Integration tests failed against staging. Fix failures before promoting to production."

  - name: dast
    command: >
      docker run --rm owasp/zap2docker-stable zap-baseline.py
        -t ${STAGING_BASE_URL}
        -I -l WARN
        -r zap-report.html
    blocking: true
    failure_message: "OWASP ZAP found critical vulnerabilities in staging. Zero critical DAST findings required."

  - name: performance-baseline
    command: >
      k6 run
        --env BASE_URL=${STAGING_BASE_URL}
        --env MAX_P99_MS=500
        tests/performance/k6/smoke.js
    blocking: true
    failure_message: "k6 smoke test failed: p99 latency exceeds 500ms threshold at baseline load."

  - name: golden-signals-check
    command: >
      bash -c "
        ERROR_RATE=$(curl -sf \"${PROMETHEUS_URL}/api/v1/query\"
          --data-urlencode 'query=rate(http_requests_total{status=~\"5..\",env=\"staging\"}[5m])/rate(http_requests_total{env=\"staging\"}[5m])'
          | jq -r '.data.result[0].value[1]');
        P99=$(curl -sf \"${PROMETHEUS_URL}/api/v1/query\"
          --data-urlencode 'query=histogram_quantile(0.99,rate(http_request_duration_seconds_bucket{env=\"staging\"}[5m]))'
          | jq -r '.data.result[0].value[1]');
        echo \"Error rate: $ERROR_RATE | p99: ${P99}s\";
        [ $(echo \"$ERROR_RATE < 0.01\" | bc -l) -eq 1 ] && [ $(echo \"$P99 < 0.5\" | bc -l) -eq 1 ]
      "
    blocking: true
    failure_message: "Golden Signals gate failed: error rate ≥ 1% or p99 latency ≥ 500ms in staging for the past 5 minutes."

  - name: pii-validation
    command: >
      bash -c "
        FINDINGS=$(kubectl logs -n staging -l app=agent-service --since=1h
          | grep -cE '"(email|cpf|full_name|ip_address)":"[^[]' || echo 0);
        echo \"PII findings in logs: $FINDINGS\";
        [ \"$FINDINGS\" -eq 0 ]
      "
    blocking: true
    failure_message: "Unmasked PII detected in staging logs. PII masking must be verified before production promotion."

staging_compliance_gates:
  - id: STG-DAST-01
    description: "OWASP ZAP full scan must pass before production promotion"
    check: "ZAP scan report present in docs/security/zap-reports/ dated today"
    severity: BLOCKING

  - id: STG-ROLLBACK-01
    description: "Rollback procedure must be validated in staging"
    check: "make rollback executed and smoke tests passed post-rollback"
    severity: BLOCKING (for normal-change and emergency-change)

  - id: STG-DORA-01
    description: "Lead time must be within DORA tracking threshold"
    check: "Time from first commit to staging deploy logged in DORA metrics"
    severity: WARNING
